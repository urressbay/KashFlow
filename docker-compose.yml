version: '3'

services:
  app:
    build: ./kashflow
    environment:
      - DATABASE_URL=mysql://user:password@db/kashflow
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=kashflow
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - app
